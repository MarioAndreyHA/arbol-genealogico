<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diseño - Mi Árbol Genealógico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="css/diseño.css">
    <link rel="icon" href="img/logo.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">🌳 Familia</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuNavegacion">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="menuNavegacion">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link active" href="diseño.html">Diseño</a></li>
                    <li class="nav-item"><a class="nav-link" href="acerca_de.html">Acerca de</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid my-5 px-4">
        <h2 class="fw-bold mb-4 text-center" style="color: var(--color-principal);">Diseñador del Árbol</h2>
        
        <div class="row">
            <div class="col-lg-3 col-md-4 mb-4">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title mb-3">Agregar Familiar</h5>
                        <form id="formFamiliar">
                            <div class="mb-3">
                                <label for="nombre" class="form-label">Nombre completo</label>
                                <input type="text" class="form-control" id="nombre" required>
                            </div>
                            <div class="mb-3">
                                <label for="parentesco" class="form-label">Parentesco</label>
                                <input type="text" class="form-control" id="parentesco" placeholder="Ej. Padre, Madre, Hijo" required>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label d-block">Género</label>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="genero" id="generoM" value="M" checked required>
                                    <label class="form-check-label" for="generoM">👨 Hombre</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="genero" id="generoF" value="F" required>
                                    <label class="form-check-label" for="generoF">👩 Mujer</label>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="fechaNacimiento" class="form-label">Fecha de nacimiento</label>
                                <input type="date" class="form-control" id="fechaNacimiento" required>
                            </div>
                            <div class="mb-3 form-check">
                                <input type="checkbox" class="form-check-input" id="esFallecido">
                                <label class="form-check-label" for="esFallecido">¿Ha fallecido?</label>
                            </div>
                            <div class="mb-3" id="divFechaFallecimiento" style="display: none;">
                                <label for="fechaFallecimiento" class="form-label">Fecha de defunción</label>
                                <input type="date" class="form-control" id="fechaFallecimiento">
                            </div>

                            <div class="mb-3">
                                <label for="padreId" class="form-label">¿Es hijo/a de?</label>
                                <select class="form-select" id="padreId">
                                    <option value="">Ninguno (Es inicio de familia)</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="parejaId" class="form-label">¿Es pareja de?</label>
                                <select class="form-select" id="parejaId">
                                    <option value="">Ninguno (Soltero/a)</option>
                                </select>
                            </div>
                            
                            <button type="submit" class="btn btn-guardar w-100 mb-2">Agregar al Árbol</button>
                            <button type="button" id="btnLimpiar" class="btn btn-outline-danger w-100 mb-4">Borrar árbol</button>
                            <hr>
                            <h6 class="text-center mb-3 text-muted">Respaldos</h6>
                            <button type="button" id="btnExportar" class="btn btn-info w-100 mb-2 text-white">📥 Descargar Respaldo</button>
                            <input type="file" id="inputFile" accept=".json" style="display: none;">
                            <button type="button" id="btnImportar" class="btn btn-warning w-100 text-dark">📤 Cargar Respaldo</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-lg-9 col-md-8">
                <div class="card shadow-sm h-100">
                    <div class="card-body">
                        <h5 class="card-title mb-4">Mapa de Raíces</h5>
                        <p class="text-muted small">💡 Haz clic en cualquier familiar para editarlo o eliminarlo</p>
                        
                        <div id="contenedorArbol" class="tree-container">
                            <p class="text-muted mt-5">Aún no hay familiares registrados, ¡Agrega el primero!</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalEdicion" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Modificar Familiar</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="formEditar">
                        <input type="hidden" id="editId">
                        <div class="mb-3">
                            <label for="editNombre" class="form-label">Nombre completo</label>
                            <input type="text" class="form-control" id="editNombre" required>
                        </div>
                        <div class="mb-3">
                            <label for="editParentesco" class="form-label">Parentesco</label>
                            <input type="text" class="form-control" id="editParentesco" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label d-block">Género</label>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="editGenero" id="editGeneroM" value="M" required>
                                <label class="form-check-label" for="editGeneroM">👨 Hombre</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="editGenero" id="editGeneroF" value="F" required>
                                <label class="form-check-label" for="editGeneroF">👩 Mujer</label>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="editFechaNacimiento" class="form-label">Fecha de nacimiento</label>
                            <input type="date" class="form-control" id="editFechaNacimiento" required>
                        </div>
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="editEsFallecido">
                            <label class="form-check-label" for="editEsFallecido">¿Ha fallecido?</label>
                        </div>
                        <div class="mb-3" id="editDivFechaFallecimiento" style="display: none;">
                            <label for="editFechaFallecimiento" class="form-label">Fecha de defunción</label>
                            <input type="date" class="form-control" id="editFechaFallecimiento">
                        </div>

                        <div class="mb-3">
                            <label for="editPadreId" class="form-label">¿Es hijo/a de?</label>
                            <select class="form-select" id="editPadreId"></select>
                        </div>
                        
                        <div class="mb-3">
                            <label for="editParejaId" class="form-label">¿Es pareja de?</label>
                            <select class="form-select" id="editParejaId"></select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer justify-content-between">
                    <button type="button" class="btn btn-danger" id="btnEliminar">Eliminar Familiar</button>
                    <div>
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="button" class="btn btn-guardar" id="btnGuardarCambios">Guardar Cambios</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="js/diseño.js"></script>
    <script src="app.js"></script>
    
    <script>
        document.getElementById('esFallecido').addEventListener('change', function() {
            document.getElementById('divFechaFallecimiento').style.display = this.checked ? 'block' : 'none';
        });
        document.getElementById('editEsFallecido').addEventListener('change', function() {
            document.getElementById('editDivFechaFallecimiento').style.display = this.checked ? 'block' : 'none';
        });
    </script>
</body>
</html>
